<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTP - Inicio de Sesión</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <main class="login-container">
        <section class="background-section" aria-label="Identidad institucional">
            <div class="top-logo" id="main-top-logo">
                <img src="./images/logoUTPsimple.jpg" alt="Logo de la Universidad Tecnológica de Panamá">
                <div class="logo-text">
                    <span>UNIVERSIDAD TECNOLÓGICA DE PANAMÁ</span>
                    <span class="sub-text">Dirección de Orientación Psicológica</span>
                </div>
            </div>
        </section>

        <section class="card-section">
            <div class="welcome-card">
                <div class="card-logo">
                    <img src="./images/logoUTPsimple.jpg" alt="Logo UTP">
                </div>

                <div class="card-content active" id="view-login">
                    <h1 class="welcome-title small-margin">Iniciar sesión</h1>
                    <p class="login-description">Acceda al sistema con su cédula y contraseña.</p>

                    <form class="login-form" id="form-login" novalidate>
                        <div class="input-group">
                            <label for="login-cedula">Cédula</label>
                            <input
                                type="text"
                                id="login-cedula"
                                name="cedula"
                                placeholder="Ejemplo: 8-111-111"
                                autocomplete="username"
                                required
                                autofocus
                            >
                        </div>

                        <div class="input-group">
                            <label for="login-password">Contraseña</label>
                            <input
                                type="password"
                                id="login-password"
                                name="password"
                                placeholder="Ingrese su contraseña"
                                autocomplete="current-password"
                                required
                            >
                        </div>

                        <p class="login-error" id="login-error" aria-live="polite"></p>

                        <button type="submit" class="btn btn-primary">Iniciar sesión</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="js/login.js"></script>
</body>
</html>
