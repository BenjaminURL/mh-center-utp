<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionar Citas · UTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/psicologo.css">
  <link rel="stylesheet" href="./css/uto_miscitas.css">
  <link rel="stylesheet" href="./css/gestionar-citas.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="logo">UTP</div>
      <div>
        <div class="brand-title">Universidad Tecnológica de Panamá</div>
        <div class="brand-subtitle">Dirección de Orientación Psicológica</div>
      </div>
    </div>

    <div class="top-actions">
      <button class="icon-circle" aria-label="Notificaciones" id="notification-btn">
        <svg viewBox="0 0 24 24">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
      <button class="profile-circle" aria-label="Perfil" id="profile-avatar">
        <svg viewBox="0 0 24 24">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>
    </div>
  </header>

  <main class="page container-layout">
    <button class="back" id="btn-back-panel">← Regresar al Panel</button>

    <div class="page-header">
      <h1>Gestionar citas</h1>
      <p>Consulta las citas solicitadas por estudiantes y actualiza su estado según la atención realizada.</p>
    </div>

    <div class="summary-row" id="summary-row">
      <div class="summary-card">
        <span class="summary-label">Disponibles</span>
        <strong id="count-disponibles">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Atendidas</span>
        <strong id="count-atendidas">0</strong>
      </div>
      <div class="summary-card">
        <span class="summary-label">Canceladas</span>
        <strong id="count-canceladas">0</strong>
      </div>
    </div>

    <div class="filters" id="filters-container">
      <button class="filter-tab on" data-filter="disponibles">Disponibles</button>
      <button class="filter-tab" data-filter="atendida">Atendidas</button>
      <button class="filter-tab" data-filter="cancelada">Canceladas</button>
      <button class="filter-tab" data-filter="todas">Todas</button>
    </div>

    <div class="cita-list" id="cita-list"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/gestionar-citas.js"></script>
</body>
</html>
