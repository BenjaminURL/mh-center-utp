<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Citas · UTP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/psicologo.css">
  <link rel="stylesheet" href="./css/uto_miscitas.css">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="logo">
        <img
          class="utp-logo"
          src="./images/icons/utp.png"
          alt="Logo de la Universidad Tecnológica de Panamá"
        >
      </div>
      <div>
        <div class="brand-title">Universidad Tecnológica de Panamá</div>
        <div class="brand-subtitle">Dirección de Orientación Psicológica</div>
      </div>
    </div>

    <div class="top-actions">
      <button class="icon-circle" aria-label="Notificaciones" id="notification-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
      
      <button class="profile-circle" aria-label="Perfil" id="profile-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21a8 8 0 0 0-16 0"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>
    </div>
  </header>

  <main class="page container-layout">
    <button class="back" id="btn-back-dashboard">← Regresar al Panel</button>

    <div class="page-header">
      <h1>Mis Citas</h1>
      <p>Gestiona y consulta todas tus citas de orientación psicológica</p>
    </div>

    <div class="filters" id="filters-container">
      <button class="filter-tab on" data-filter="todas">Todas</button>
      <button class="filter-tab" data-filter="agendada">Agendadas</button>
      <button class="filter-tab" data-filter="atendida">Atendidas</button>
      <button class="filter-tab" data-filter="cancelada">Canceladas</button>
    </div>

    <div class="cita-list" id="cita-list"></div>
  </main>
  <div class="overlay" id="ov-del">
    <div class="del-modal">
      <div class="del-icon">🗑️</div>
      <div class="del-title">¿Cancelar esta cita?</div>
      <div class="del-body">Esta acción no se puede deshacer. Se notificará al psicólogo y quedará un registro de la cancelación de la sesión.</div>
      <div class="del-actions">
        <button class="btn-full btn-outline-full" id="btn-cancel-del">No, mantener</button>
        <button class="btn-full btn-danger-full" id="btn-confirm-del">Sí, cancelar cita</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/utp_miscitas.js"></script>
</body>
</html>
